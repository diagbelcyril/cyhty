<div class="weapons-page">
  <div class="bg"></div>

  <nav class="navbar">
    <div class="logo">CYHT LOADOUTS</div>

    <button class="menu-btn" (click)="menuOpen = !menuOpen">
      ☰
    </button>

    <ul class="nav-links" [class.open]="menuOpen">
      <li><a routerLink="/home" (click)="menuOpen=false">HOME</a></li>
      <li><a routerLink="/weapons" (click)="menuOpen=false">WEAPONS</a></li>
      <li><a routerLink="/about" (click)="menuOpen=false">ABOUT</a></li>
      <li><a routerLink="/contacts" (click)="menuOpen=false">CONTACT US</a></li>
    </ul>
  </nav>

  <section class="weapon-sections">
    <div
      class="weapon-column"
      *ngFor="let category of categories"
      [class.mythic-section]="category.isMythic"
    >
      <h2>{{ category.title }}</h2>

      <div
        class="weapon-box"
        *ngFor="let gun of category.items"
        [routerLink]="['/weapon', gun.id]"
        [class.mythic-card]="category.isMythic"
      >
        <div class="mythic-sparkle" *ngIf="category.isMythic"></div>
        <img [src]="gun.image" [alt]="gun.name">
        <span>{{ gun.name }}</span>
      </div>
    </div>
  </section>
</div>
